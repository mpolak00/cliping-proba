<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PeptidiHR Video Brander</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
:root{--bg:#09090b;--card:#18181b;--border:#3f3f46;--accent:#22c55e;--accent2:#16a34a;--text:#fff;--muted:#71717a;--red:#ef4444}
body{background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}

/* HEADER */
.hdr{background:#111;border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hdr-icon{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#000;flex-shrink:0;box-shadow:0 0 20px #22c55e55}
.hdr-title{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-0.5px}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.hdr-status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* LAYOUT */
.wrap{max-width:560px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* UPLOAD BUTTONS — jedini pouzdani pattern za iOS+Android+Desktop */
.upload-label{
  display:block;
  position:relative;
  border:2px dashed var(--border);
  border-radius:12px;
  padding:20px 16px;
  text-align:center;
  cursor:pointer;
  transition:all 0.2s;
  margin-bottom:10px;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.upload-label:hover,.upload-label:active{border-color:var(--accent);background:rgba(34,197,94,0.05)}
.upload-label.has-file{border-color:var(--accent);border-style:solid;background:rgba(34,197,94,0.07)}
.upload-label input[type=file]{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  opacity:0;
  cursor:pointer;
  font-size:0;
  -webkit-appearance:none;
}
.upload-icon{font-size:28px;margin-bottom:8px}
.upload-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.upload-hint{font-size:11px;color:var(--muted)}

/* PRESETS */
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.preset-btn{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;font-size:12px;color:var(--text);transition:all 0.15s;font-weight:600}
.preset-btn:hover,.preset-btn:active{border-color:var(--accent);color:var(--accent);background:rgba(34,197,94,0.05)}

/* SETTINGS */
details summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:4px 0;color:var(--muted);font-size:13px;font-weight:600;-webkit-tap-highlight-color:transparent}
details summary::-webkit-details-marker{display:none}
details summary .chev{transition:transform 0.2s;font-size:11px}
details[open] summary .chev{transform:rotate(180deg)}
details .inner{padding-top:14px;display:flex;flex-direction:column;gap:14px}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.row label{font-size:13px;color:var(--muted);flex-shrink:0}
.row span{font-size:12px;color:var(--accent);font-weight:700;min-width:36px;text-align:right}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;background:#27272a;border-radius:2px;outline:none;cursor:pointer;flex:1}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #000}
input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
input[type=text]{background:#09090b;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;width:100%;outline:none}
input[type=text]:focus{border-color:var(--accent)}
select{background:#09090b;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;outline:none;cursor:pointer}
.sep{height:1px;background:var(--border);margin:4px 0}

/* BRAND IT */
.brand-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:18px;
  background:var(--accent);color:#000;
  font-size:18px;font-weight:800;
  border:none;border-radius:14px;cursor:pointer;
  transition:all 0.15s;
  box-shadow:0 0 30px #22c55e44;
  -webkit-tap-highlight-color:transparent;
  margin-bottom:14px;
}
.brand-btn:hover{background:#16a34a}
.brand-btn:active{transform:scale(0.98)}
.brand-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* PROGRESS */
.prog-bar-wrap{height:8px;background:#27272a;border-radius:4px;overflow:hidden;margin:12px 0}
.prog-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.4s ease;background:linear-gradient(90deg,#22c55e,#4ade80)}
.log-box{font-family:monospace;font-size:11px;color:var(--muted);max-height:120px;overflow-y:auto;margin-top:8px;space-y:4px}
.log-ok{color:var(--accent)}
.log-err{color:var(--red)}
.log-warn{color:#f59e0b}

/* DOWNLOAD */
.dl-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:#1f2937;color:var(--text);font-size:15px;font-weight:700;border:2px solid var(--accent);border-radius:12px;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.dl-btn:hover,.dl-btn:active{background:rgba(34,197,94,0.1)}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f2937;border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:10px;font-size:13px;z-index:999;max-width:90vw;text-align:center;transition:opacity 0.3s;pointer-events:none}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-icon"><i class="fa-solid fa-video"></i></div>
  <div>
    <div class="hdr-title">PeptidiHR</div>
    <div class="hdr-sub">Video Brander</div>
  </div>
  <div class="hdr-status">
    <div class="dot"></div>
    <span id="ffmpeg-status">Spreman</span>
  </div>
</div>

<div class="wrap">

  <!-- 1. UPLOAD -->
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-upload"></i> Upload fajlova</div>

    <!-- VIDEO — LABEL s inputom unutra (radi na iOS/Android/Desktop) -->
    <label class="upload-label" id="lbl-video-wrap">
      <input type="file" id="inp-video" accept="video/mp4,video/quicktime,video/webm,video/*">
      <div class="upload-icon">🎬</div>
      <div class="upload-name">Odaberi video</div>
      <div class="upload-hint" id="lbl-video">MP4, MOV, WEBM &bull; max 500MB</div>
    </label>

    <!-- LOGO -->
    <label class="upload-label" id="lbl-logo-wrap">
      <input type="file" id="inp-logo" accept="image/png,image/jpeg,image/webp,image/*">
      <div class="upload-icon">🏷️</div>
      <div class="upload-name">Odaberi logo (opcionalno)</div>
      <div class="upload-hint" id="lbl-logo">PNG s providnom pozadinom</div>
    </label>

    <!-- OUTRO -->
    <label class="upload-label" id="lbl-outro-wrap" style="margin-bottom:0">
      <input type="file" id="inp-outro" accept="image/png,image/jpeg,image/webp,image/*">
      <div class="upload-icon">🖼️</div>
      <div class="upload-name">Outro slika (opcionalno)</div>
      <div class="upload-hint" id="lbl-outro">Pozadina za 2s outro ekran</div>
    </label>
  </div>

  <!-- 2. BRZI PRESETS -->
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-wand-magic-sparkles"></i> Brzi presets</div>
    <div class="preset-grid">
      <div class="preset-btn" onclick="applyPreset('hype')">⚡ Hype Mode</div>
      <div class="preset-btn" onclick="applyPreset('moody')">🌑 Dark Moody</div>
      <div class="preset-btn" onclick="applyPreset('clean')">✨ Clean Viral</div>
      <div class="preset-btn" onclick="applyPreset('cinematic')">🎬 Cinematic</div>
      <div class="preset-btn" onclick="applyPreset('tiktok')" style="grid-column:1/-1">🔥 TikTok Fast</div>
    </div>
  </div>

  <!-- 3. NAPREDNE POSTAVKE -->
  <div class="card">
    <details>
      <summary>
        <span><i class="fa-solid fa-sliders" style="color:var(--accent);margin-right:8px"></i>Napredne postavke</span>
        <i class="fa-solid fa-chevron-down chev"></i>
      </summary>
      <div class="inner">

        <!-- Speed -->
        <div class="row">
          <label>Brzina videa</label>
          <input type="range" id="s-speed" min="0.8" max="1.4" step="0.05" value="1.05" oninput="sv('speed',this.value+'x')">
          <span id="v-speed">1.05x</span>
        </div>

        <!-- Brightness -->
        <div class="row">
          <label>Svjetlina</label>
          <input type="range" id="s-bright" min="-0.2" max="0.2" step="0.01" value="0" oninput="sv('bright',this.value)">
          <span id="v-bright">0</span>
        </div>

        <!-- Contrast -->
        <div class="row">
          <label>Kontrast</label>
          <input type="range" id="s-contrast" min="0.8" max="1.5" step="0.05" value="1.0" oninput="sv('contrast',this.value)">
          <span id="v-contrast">1.0</span>
        </div>

        <!-- Saturation -->
        <div class="row">
          <label>Zasićenost</label>
          <input type="range" id="s-sat" min="0.5" max="2.0" step="0.05" value="1.0" oninput="sv('sat',this.value)">
          <span id="v-sat">1.0</span>
        </div>

        <div class="sep"></div>

        <!-- Grain -->
        <div class="row">
          <label>Film grain (anti-detect)</label>
          <input type="checkbox" id="s-grain">
        </div>

        <!-- Flip -->
        <div class="row">
          <label>Horizontalni flip</label>
          <input type="checkbox" id="s-flip">
        </div>

        <div class="sep"></div>

        <!-- URL overlay -->
        <div>
          <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px">Tekst overlay (URL/branding)</label>
          <input type="text" id="s-url" value="peptidihr.com" placeholder="npr. peptidihr.com">
        </div>

        <!-- Logo position -->
        <div class="row">
          <label>Pozicija loga</label>
          <select id="s-logopos">
            <option value="BR">Donji desni</option>
            <option value="BL">Donji lijevi</option>
            <option value="TR">Gornji desni</option>
            <option value="TL">Gornji lijevi</option>
          </select>
        </div>

        <!-- Logo size -->
        <div class="row">
          <label>Veličina loga</label>
          <input type="range" id="s-logosize" min="60" max="220" step="10" value="120" oninput="sv('logosize',this.value+'px')">
          <span id="v-logosize">120px</span>
        </div>

        <!-- Logo opacity -->
        <div class="row">
          <label>Opacity loga</label>
          <input type="range" id="s-logoop" min="0.2" max="1.0" step="0.05" value="0.85" oninput="sv('logoop',Math.round(this.value*100)+'%')">
          <span id="v-logoop">85%</span>
        </div>

        <div class="sep"></div>

        <!-- Outro -->
        <div class="row">
          <label>Dodaj outro (2 sek.)</label>
          <input type="checkbox" id="s-outro" checked>
        </div>

        <div>
          <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:6px">Outro tekst</label>
          <input type="text" id="s-outro-text" value="peptidihr.com" placeholder="Tekst na outro ekranu">
        </div>

      </div>
    </details>
  </div>

  <!-- 4. BRAND IT -->
  <button class="brand-btn" id="brand-btn" onclick="startBrand()">
    <i class="fa-solid fa-wand-magic-sparkles"></i>
    Brand It!
  </button>

  <!-- 5. PROGRESS -->
  <div class="card" id="prog-panel" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <span style="font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px">
        <i class="fa-solid fa-spinner fa-spin" style="color:var(--accent)"></i>
        <span id="prog-label">Inicijalizacija...</span>
      </span>
      <span id="prog-pct" style="font-size:14px;font-weight:800;color:var(--accent)">0%</span>
    </div>
    <div class="prog-bar-wrap">
      <div class="prog-bar-fill" id="prog-bar" style="width:0%"></div>
    </div>
    <div class="log-box" id="log-box"></div>
  </div>

  <!-- 6. DOWNLOAD -->
  <div class="card" id="dl-panel" style="display:none">
    <div class="card-title"><i class="fa-solid fa-check-circle"></i> Video spreman!</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px" id="dl-info">—</div>
    <button class="dl-btn" id="dl-btn">
      <i class="fa-solid fa-download"></i>
      Preuzmi branded video
    </button>
    <button onclick="resetApp()" style="display:block;width:100%;margin-top:10px;padding:10px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:10px;cursor:pointer;font-size:13px;-webkit-tap-highlight-color:transparent">
      ↩ Obradi drugi video
    </button>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast" style="opacity:0"></div>

<!-- FFmpeg.wasm 0.11.6 -->
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<script>
'use strict';

// ── Globals ──────────────────────────────────────────────────────────────
let videoFile = null, logoFile = null, outroFile = null;
let ffmpeg = null;
let outputBlob = null;
let progInterval = null;
const { createFFmpeg, fetchFile } = FFmpeg;

// ── Slider value display ──────────────────────────────────────────────────
function sv(id, val) {
  document.getElementById('v-' + id).textContent = val;
}

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg, dur = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', dur);
}

// ── Upload setup ──────────────────────────────────────────────────────────
function setupUploads() {
  // Video
  document.getElementById('inp-video').addEventListener('change', function () {
    const f = this.files[0];
    if (!f) return;
    if (f.size > 500 * 1024 * 1024) { toast('Video je veći od 500MB!'); return; }
    videoFile = f;
    document.getElementById('lbl-video').textContent =
      '✓ ' + f.name + ' (' + (f.size / 1024 / 1024).toFixed(1) + ' MB)';
    document.getElementById('lbl-video-wrap').classList.add('has-file');
    toast('Video učitan: ' + f.name);
  });

  // Logo
  document.getElementById('inp-logo').addEventListener('change', function () {
    const f = this.files[0];
    if (!f) return;
    logoFile = f;
    document.getElementById('lbl-logo').textContent = '✓ ' + f.name;
    document.getElementById('lbl-logo-wrap').classList.add('has-file');
    toast('Logo učitan.');
  });

  // Outro
  document.getElementById('inp-outro').addEventListener('change', function () {
    const f = this.files[0];
    if (!f) return;
    outroFile = f;
    document.getElementById('lbl-outro').textContent = '✓ ' + f.name;
    document.getElementById('lbl-outro-wrap').classList.add('has-file');
    toast('Outro slika učitana.');
  });
}
setupUploads();

// ── Presets ───────────────────────────────────────────────────────────────
const PRESETS = {
  hype:      { speed: 1.15, bright: 0.03,  contrast: 1.05, sat: 1.25, grain: true,  flip: false },
  moody:     { speed: 0.92, bright: -0.05, contrast: 1.15, sat: 0.90, grain: true,  flip: false },
  clean:     { speed: 1.05, bright: 0.02,  contrast: 1.05, sat: 1.10, grain: false, flip: false },
  cinematic: { speed: 0.95, bright: 0.02,  contrast: 1.20, sat: 0.95, grain: true,  flip: false },
  tiktok:    { speed: 1.22, bright: 0.04,  contrast: 1.08, sat: 1.30, grain: true,  flip: true  },
};

function applyPreset(name) {
  const p = PRESETS[name];
  if (!p) return;
  document.getElementById('s-speed').value    = p.speed;
  document.getElementById('s-bright').value   = p.bright;
  document.getElementById('s-contrast').value = p.contrast;
  document.getElementById('s-sat').value      = p.sat;
  document.getElementById('s-grain').checked  = p.grain;
  document.getElementById('s-flip').checked   = p.flip;
  sv('speed',    p.speed + 'x');
  sv('bright',   p.bright);
  sv('contrast', p.contrast);
  sv('sat',      p.sat);
  toast('Preset primijenjen: ' + name);
}

// ── Progress helpers ──────────────────────────────────────────────────────
let currentPct = 0;

function setProgress(pct, label) {
  currentPct = Math.max(currentPct, pct);
  document.getElementById('prog-bar').style.width = currentPct + '%';
  document.getElementById('prog-pct').textContent = currentPct + '%';
  if (label) document.getElementById('prog-label').textContent = label;
}

function log(msg, type = '') {
  const box = document.getElementById('log-box');
  const line = document.createElement('div');
  line.className = type ? 'log-' + type : '';
  line.textContent = '› ' + msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function startFakeProgress(from, to, durationMs) {
  clearInterval(progInterval);
  const step = (to - from) / (durationMs / 600);
  progInterval = setInterval(() => {
    if (currentPct >= to) { clearInterval(progInterval); return; }
    setProgress(Math.min(to, currentPct + step));
  }, 600);
}

// ── Read settings ─────────────────────────────────────────────────────────
function getSettings() {
  return {
    speed:     parseFloat(document.getElementById('s-speed').value),
    bright:    parseFloat(document.getElementById('s-bright').value),
    contrast:  parseFloat(document.getElementById('s-contrast').value),
    sat:       parseFloat(document.getElementById('s-sat').value),
    grain:     document.getElementById('s-grain').checked,
    flip:      document.getElementById('s-flip').checked,
    url:       (document.getElementById('s-url').value || '').replace(/'/g,"'").replace(/:/g,'\\:').replace(/,/g,' ').replace(/;/g,' ').trim(),
    logoPos:   document.getElementById('s-logopos').value,
    logoSize:  parseInt(document.getElementById('s-logosize').value),
    logoOp:    parseFloat(document.getElementById('s-logoop').value),
    outro:     document.getElementById('s-outro').checked,
    outroText: (document.getElementById('s-outro-text').value || '').replace(/'/g,"'").replace(/:/g,' ').trim(),
  };
}

// ── Safe text for FFmpeg drawtext ─────────────────────────────────────────
function esc(t) {
  return (t || '').replace(/\\/g, '/').replace(/'/g, '').replace(/"/g, '').replace(/:/g, ' ').replace(/[,;[\]]/g, ' ').trim();
}

// ── Build video filter string (-vf) ──────────────────────────────────────
function buildVF(s) {
  const vf = ['scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black'];
  if (Math.abs(s.speed - 1.0) > 0.02) {
    vf.push('setpts=' + (1 / s.speed).toFixed(4) + '*PTS');
  }
  const hasBr  = Math.abs(s.bright) > 0.005;
  const hasCt  = Math.abs(s.contrast - 1) > 0.01;
  const hasSat = Math.abs(s.sat - 1) > 0.01;
  if (hasBr || hasCt || hasSat) {
    vf.push('eq=brightness=' + s.bright.toFixed(3) + ':contrast=' + s.contrast.toFixed(2) + ':saturation=' + s.sat.toFixed(2));
  }
  if (s.grain) vf.push('noise=alls=8:allf=a');
  if (s.flip)  vf.push('hflip');
  const urlText = esc(s.url);
  if (urlText) {
    vf.push("drawtext=text='" + urlText + "':fontsize=34:fontcolor=white:shadowcolor=black:shadowx=2:shadowy=2:x=(w-text_w)/2:y=h-text_h-50");
  }
  return vf.join(',');
}

// ── Build audio filter string (-af) ───────────────────────────────────────
function buildAF(s) {
  const af = [];
  if (Math.abs(s.speed - 1.0) > 0.02) {
    af.push('atempo=' + Math.max(0.5, Math.min(2.0, s.speed)).toFixed(4));
  }
  af.push('volume=1.3');
  return af.join(',');
}

// ── Run ffmpeg.run and verify output exists ───────────────────────────────
async function runFF(args, outFile) {
  await ffmpeg.run(...args);
  try {
    const d = ffmpeg.FS('readFile', outFile);
    return d && d.length > 500;
  } catch { return false; }
}

// ── MAIN BRAND FUNCTION ───────────────────────────────────────────────────
async function startBrand() {
  if (!videoFile) { toast('Odaberi video prvo!'); return; }

  currentPct = 0;
  document.getElementById('brand-btn').disabled = true;
  document.getElementById('prog-panel').style.display = '';
  document.getElementById('dl-panel').style.display = 'none';
  document.getElementById('log-box').innerHTML = '';
  document.getElementById('prog-label').textContent = 'Inicijalizacija...';
  window.scrollTo({ top: document.getElementById('prog-panel').offsetTop - 20, behavior: 'smooth' });

  try {
    // ── Load FFmpeg ──────────────────────────────────────────────────────
    if (!ffmpeg) {
      setProgress(3, 'Učitavam FFmpeg engine...');
      log('Učitavam FFmpeg.wasm (~25MB)...');
      document.getElementById('ffmpeg-status').textContent = 'Učitavam...';
      ffmpeg = createFFmpeg({
        corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
        log: false
      });
      await ffmpeg.load();
      document.getElementById('ffmpeg-status').textContent = 'Aktivan';
      log('FFmpeg spreman.', 'ok');
    }

    setProgress(8, 'Priprema datoteka...');
    const s = getSettings();
    const hasLogo = !!logoFile;

    // ── Write inputs to MEMFS ────────────────────────────────────────────
    log('Pišem video u memoriju...');
    ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(videoFile));
    log('Video u memoriji (' + (videoFile.size / 1024 / 1024).toFixed(1) + ' MB).', 'ok');

    if (hasLogo) {
      ffmpeg.FS('writeFile', 'logo.png', await fetchFile(logoFile));
      log('Logo u memoriji.', 'ok');
    }

    // ── STEP 1: Encode with all video + audio filters (no logo yet) ───────
    setProgress(15, 'Obrađujem video...');
    log('Pokretam FFmpeg (korak 1)...');
    startFakeProgress(15, hasLogo ? 65 : 83, 90000);

    const vfStr = buildVF(s);
    const afStr = buildAF(s);

    // Try with drawtext first, retry without if it fails (font might be missing)
    let step1OK = await runFF([
      '-i', 'input.mp4',
      '-vf', vfStr, '-af', afStr,
      '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '23',
      '-pix_fmt', 'yuv420p', '-c:a', 'aac', '-b:a', '128k',
      '-movflags', '+faststart', '-r', '30', '-y', 'step1.mp4'
    ], 'step1.mp4');

    if (!step1OK) {
      // Retry without drawtext
      log('Retry bez text overlay...', 'warn');
      const vfNoText = buildVF({ ...s, url: '' });
      step1OK = await runFF([
        '-i', 'input.mp4',
        '-vf', vfNoText, '-af', afStr,
        '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '23',
        '-pix_fmt', 'yuv420p', '-c:a', 'aac', '-b:a', '128k',
        '-movflags', '+faststart', '-r', '30', '-y', 'step1.mp4'
      ], 'step1.mp4');
    }

    if (!step1OK) {
      // Last resort: bare minimum encode (scale only)
      log('Retry s minimalnim filterima...', 'warn');
      step1OK = await runFF([
        '-i', 'input.mp4',
        '-vf', 'scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black',
        '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '23',
        '-pix_fmt', 'yuv420p', '-c:a', 'aac', '-b:a', '128k',
        '-movflags', '+faststart', '-r', '30', '-y', 'step1.mp4'
      ], 'step1.mp4');
    }

    if (!step1OK) throw new Error('Video encode nije uspio. Provjeri format videa (MP4/MOV/WEBM).');

    clearInterval(progInterval);
    log('Korak 1 gotov.', 'ok');

    // ── STEP 2: Logo overlay (if logo) — separate pass, clean syntax ──────
    let mainFile = 'step1.mp4';

    if (hasLogo) {
      setProgress(68, 'Dodajem logo...');
      log('Dodajem logo overlay...');
      startFakeProgress(68, 83, 20000);

      const pad = 28, ls = s.logoSize;
      const opa = s.logoOp.toFixed(2);
      const posMap = {
        BR: 'x=W-w-' + pad + ':y=H-h-' + pad,
        BL: 'x=' + pad + ':y=H-h-' + pad,
        TR: 'x=W-w-' + pad + ':y=' + pad,
        TL: 'x=' + pad + ':y=' + pad,
      };
      const overlayXY = posMap[s.logoPos] || posMap['BR'];

      // Logo filter: scale to max size preserving aspect, add alpha, overlay
      const logoFC = '[1:v]scale=' + ls + ':-2,format=rgba,colorchannelmixer=aa=' + opa + '[lg];[0:v][lg]overlay=' + overlayXY + '[vo]';

      const logoOK = await runFF([
        '-i', 'step1.mp4',
        '-i', 'logo.png',
        '-filter_complex', logoFC,
        '-map', '[vo]', '-map', '0:a?',
        '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '23',
        '-pix_fmt', 'yuv420p', '-c:a', 'copy',
        '-movflags', '+faststart', '-r', '30', '-y', 'main.mp4'
      ], 'main.mp4');

      clearInterval(progInterval);
      if (logoOK) {
        mainFile = 'main.mp4';
        log('Logo dodan.', 'ok');
      } else {
        log('Logo overlay preskočen (nekompatibilni format slike?).', 'warn');
        mainFile = 'step1.mp4';
      }
    }

    // ── STEP 3: Outro (optional) ──────────────────────────────────────────
    let finalFile = mainFile;

    if (s.outro) {
      setProgress(85, 'Generiram outro...');
      log('Generiram outro ekran...');

      // Simple black screen, 2 seconds
      const outroOK = await runFF([
        '-f', 'lavfi', '-i', 'color=c=black:s=1080x1920:r=30',
        '-t', '2',
        '-an',
        '-c:v', 'libx264', '-preset', 'ultrafast', '-pix_fmt', 'yuv420p', '-r', '30',
        '-y', 'outro.mp4'
      ], 'outro.mp4');

      if (outroOK) {
        setProgress(90, 'Spajam outro...');
        // Concat: video from both, audio only from main (outro has none)
        const concatOK = await runFF([
          '-i', mainFile,
          '-i', 'outro.mp4',
          '-filter_complex', '[0:v][1:v]concat=n=2:v=1:a=0[vo]',
          '-map', '[vo]', '-map', '0:a?',
          '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '23',
          '-pix_fmt', 'yuv420p', '-c:a', 'copy',
          '-movflags', '+faststart', '-r', '30', '-y', 'final.mp4'
        ], 'final.mp4');

        if (concatOK) {
          finalFile = 'final.mp4';
          log('Outro spojen.', 'ok');
        } else {
          log('Concat preskočen.', 'warn');
        }
      } else {
        log('Outro generiranje preskočeno.', 'warn');
      }
    }

    // ── Read output ───────────────────────────────────────────────────────
    setProgress(97, 'Čitam output...');
    const data = ffmpeg.FS('readFile', finalFile);
    if (!data || data.length < 500) throw new Error('Output fajl je prazan ili oštećen.');

    outputBlob = new Blob([data.buffer], { type: 'video/mp4' });
    const sizeMB = (data.length / 1024 / 1024).toFixed(2);
    log('Output: ' + sizeMB + ' MB', 'ok');

    // Cleanup MEMFS
    ['input.mp4','step1.mp4','main.mp4','final.mp4','logo.png','outro.mp4'].forEach(f => {
      try { ffmpeg.FS('unlink', f); } catch {}
    });

    setProgress(100, 'Gotovo!');
    log('Sve gotovo!', 'ok');
    document.getElementById('dl-info').textContent = 'Veličina: ' + sizeMB + ' MB • Format: MP4 1080×1920 (9:16)';
    document.getElementById('dl-panel').style.display = '';
    setTimeout(() => { document.getElementById('prog-panel').style.display = 'none'; }, 1500);
    window.scrollTo({ top: document.getElementById('dl-panel').offsetTop - 20, behavior: 'smooth' });
    toast('Video je spreman za download!');

  } catch (err) {
    clearInterval(progInterval);
    setProgress(0, 'Greška!');
    log('GREŠKA: ' + err.message, 'err');
    document.getElementById('prog-label').textContent = 'Greška!';
    toast('Greška: ' + err.message);
    console.error(err);
  } finally {
    document.getElementById('brand-btn').disabled = false;
  }
}

// ── Download ──────────────────────────────────────────────────────────────
document.getElementById('dl-btn').addEventListener('click', function () {
  if (!outputBlob) { toast('Nema videa. Pokreni Brand It prvo.'); return; }
  const url = URL.createObjectURL(outputBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'peptidihr-' + Date.now() + '.mp4';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 10000);
});

// ── Reset ─────────────────────────────────────────────────────────────────
function resetApp() {
  videoFile = null; logoFile = null; outroFile = null; outputBlob = null;
  currentPct = 0;
  document.getElementById('dl-panel').style.display = 'none';
  document.getElementById('prog-panel').style.display = 'none';
  ['lbl-video','lbl-logo','lbl-outro'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = el.id === 'lbl-video' ? 'MP4, MOV, WEBM • max 500MB' : el.id === 'lbl-logo' ? 'PNG s providnom pozadinom' : 'Pozadina za 2s outro ekran';
  });
  ['lbl-video-wrap','lbl-logo-wrap','lbl-outro-wrap'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('has-file');
  });
  ['inp-video','inp-logo','inp-outro'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
